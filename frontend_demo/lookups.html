<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Číselníky - HeroWizzard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--gray-200); margin-bottom: 1.5rem; }
        .tab-btn {
            padding: 0.75rem 1.5rem; border: none; background: none; cursor: pointer;
            font-size: 0.95rem; color: var(--gray-500); font-weight: 500;
            border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s;
        }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-btn:hover { color: var(--gray-700); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .lookup-table { width: 100%; border-collapse: collapse; }
        .lookup-table th { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.8rem;
            text-transform: uppercase; color: var(--gray-500); border-bottom: 1px solid var(--gray-200); }
        .lookup-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
        .lookup-table tr.inactive td { opacity: 0.5; }
        .lookup-table input[type="text"], .lookup-table input[type="number"], .lookup-table select {
            padding: 0.35rem 0.5rem; border: 1px solid var(--gray-300); border-radius: 4px;
            font-size: 0.9rem; width: 100%; box-sizing: border-box;
        }
        .lookup-table input[type="number"] { width: 70px; }
        .badge-inactive { font-size: 0.75rem; padding: 2px 6px; border-radius: 3px;
            background: #fee2e2; color: #991b1b; }
        .badge-active { font-size: 0.75rem; padding: 2px 6px; border-radius: 3px;
            background: #dcfce7; color: #166534; }
        .add-row { margin-top: 1rem; }
        .add-form { display: flex; gap: 0.5rem; align-items: flex-end; flex-wrap: wrap;
            padding: 1rem; background: var(--gray-50); border-radius: 8px; margin-top: 0.5rem; }
        .add-form .form-group { margin-bottom: 0; }
        .add-form label { font-size: 0.8rem; font-weight: 500; display: block; margin-bottom: 0.25rem; }
        .add-form input, .add-form select {
            padding: 0.4rem 0.5rem; border: 1px solid var(--gray-300); border-radius: 4px; font-size: 0.9rem;
        }
        .btn-icon { padding: 0.3rem 0.6rem; font-size: 0.85rem; cursor: pointer; border-radius: 4px; border: 1px solid var(--gray-300); background: white; }
        .btn-icon:hover { background: var(--gray-100); }
        .btn-save-row { color: #166534; border-color: #166534; }
        .btn-deactivate { color: #991b1b; border-color: #991b1b; font-size: 0.8rem; }
        .btn-activate { color: #166534; border-color: #166534; font-size: 0.8rem; }
        .subgroup-product { font-size: 0.8rem; color: var(--gray-500); }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container">
            <h1 id="app-title">HeroWizzard</h1>
            <nav>
                <a href="dashboard.html">Přehled</a>
                <a href="upload.html">Import CSV</a>
                <a href="categories.html">Pravidla kategorií</a>
                <a href="lookups.html">Číselníky</a>
            </nav>
            <div class="user-info">
                <span id="user-info">Načítání...</span>
                <button class="logout-btn" id="logout-btn">Odhlásit</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="alert-container"></div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Číselníky</h2>
                <label style="font-size:0.85rem;color:var(--gray-500);">
                    <input type="checkbox" id="show-inactive"> Zobrazit neaktivní
                </label>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="projects">Projekty</button>
                <button class="tab-btn" data-tab="products">Produkty</button>
                <button class="tab-btn" data-tab="subgroups">Podskupiny</button>
            </div>

            <!-- PROJECTS TAB -->
            <div class="tab-panel active" id="panel-projects">
                <table class="lookup-table" id="projects-table">
                    <thead>
                        <tr>
                            <th style="width:60px">Pořadí</th>
                            <th>ID</th>
                            <th>Název</th>
                            <th>Popis</th>
                            <th style="width:80px">Stav</th>
                            <th style="width:100px">Akce</th>
                        </tr>
                    </thead>
                    <tbody id="projects-body"></tbody>
                </table>
                <div class="add-row">
                    <button class="btn btn-primary btn-sm" id="add-project-btn">+ Přidat projekt</button>
                    <div class="add-form" id="add-project-form" style="display:none;">
                        <div class="form-group">
                            <label>ID (slug)</label>
                            <input type="text" id="new-project-id" placeholder="muj-projekt" style="width:140px;">
                        </div>
                        <div class="form-group">
                            <label>Název</label>
                            <input type="text" id="new-project-name" placeholder="Můj Projekt" style="width:180px;">
                        </div>
                        <div class="form-group">
                            <label>Popis</label>
                            <input type="text" id="new-project-desc" placeholder="Popis..." style="width:200px;">
                        </div>
                        <button class="btn btn-primary btn-sm" id="save-new-project">Uložit</button>
                        <button class="btn btn-outline btn-sm" id="cancel-new-project">Zrušit</button>
                    </div>
                </div>
            </div>

            <!-- PRODUCTS TAB -->
            <div class="tab-panel" id="panel-products">
                <table class="lookup-table" id="products-table">
                    <thead>
                        <tr>
                            <th style="width:60px">Pořadí</th>
                            <th>ID</th>
                            <th>Název</th>
                            <th>Kategorie</th>
                            <th>Popis</th>
                            <th style="width:80px">Stav</th>
                            <th style="width:100px">Akce</th>
                        </tr>
                    </thead>
                    <tbody id="products-body"></tbody>
                </table>
                <div class="add-row">
                    <button class="btn btn-primary btn-sm" id="add-product-btn">+ Přidat produkt</button>
                    <div class="add-form" id="add-product-form" style="display:none;">
                        <div class="form-group">
                            <label>ID (slug)</label>
                            <input type="text" id="new-product-id" placeholder="muj-produkt" style="width:140px;">
                        </div>
                        <div class="form-group">
                            <label>Název</label>
                            <input type="text" id="new-product-name" placeholder="Můj Produkt" style="width:180px;">
                        </div>
                        <div class="form-group">
                            <label>Kategorie</label>
                            <select id="new-product-category">
                                <option value="SKOLY">ŠKOLY</option>
                                <option value="FIRMY">FIRMY</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Popis</label>
                            <input type="text" id="new-product-desc" placeholder="Popis..." style="width:160px;">
                        </div>
                        <button class="btn btn-primary btn-sm" id="save-new-product">Uložit</button>
                        <button class="btn btn-outline btn-sm" id="cancel-new-product">Zrušit</button>
                    </div>
                </div>
            </div>

            <!-- SUBGROUPS TAB -->
            <div class="tab-panel" id="panel-subgroups">
                <table class="lookup-table" id="subgroups-table">
                    <thead>
                        <tr>
                            <th style="width:60px">Pořadí</th>
                            <th>ID</th>
                            <th>Název</th>
                            <th>Produkt</th>
                            <th>Popis</th>
                            <th style="width:80px">Stav</th>
                            <th style="width:100px">Akce</th>
                        </tr>
                    </thead>
                    <tbody id="subgroups-body"></tbody>
                </table>
                <div class="add-row">
                    <button class="btn btn-primary btn-sm" id="add-subgroup-btn">+ Přidat podskupinu</button>
                    <div class="add-form" id="add-subgroup-form" style="display:none;">
                        <div class="form-group">
                            <label>ID (slug)</label>
                            <input type="text" id="new-subgroup-id" placeholder="produkt-podskupina" style="width:160px;">
                        </div>
                        <div class="form-group">
                            <label>Název</label>
                            <input type="text" id="new-subgroup-name" placeholder="Podskupina" style="width:160px;">
                        </div>
                        <div class="form-group">
                            <label>Produkt</label>
                            <select id="new-subgroup-product"></select>
                        </div>
                        <div class="form-group">
                            <label>Popis</label>
                            <input type="text" id="new-subgroup-desc" placeholder="Popis..." style="width:160px;">
                        </div>
                        <button class="btn btn-primary btn-sm" id="save-new-subgroup">Uložit</button>
                        <button class="btn btn-outline btn-sm" id="cancel-new-subgroup">Zrušit</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        if (!requireAuth()) return;
        setupNavbar();

        // Admin-only page check
        const user = auth.getUser();
        if (!user || user.role !== 'admin') {
            document.querySelector('main.container').innerHTML =
                '<div class="card" style="padding:2rem;text-align:center;color:#991b1b;">Tato stránka je dostupná pouze pro administrátory.</div>';
            return;
        }

        const alertContainer = document.getElementById('alert-container');
        const showInactive = document.getElementById('show-inactive');
        let allProducts = []; // cached for subgroup product dropdown

        // ---- Tab switching ----
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');
            });
        });

        // ---- Generic helpers ----
        function slugify(text) {
            return text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        }

        async function saveField(endpoint, id, field, value) {
            try {
                await api.request(`${endpoint}${id}/`, {
                    method: 'PATCH',
                    body: JSON.stringify({ [field]: value })
                });
            } catch (err) {
                utils.showAlert(alertContainer, `Uložení selhalo: ${err.message}`, 'danger');
            }
        }

        async function toggleActive(endpoint, id, currentActive) {
            try {
                if (currentActive) {
                    // Deactivate via DELETE (performs soft-delete in viewset)
                    await api.request(`${endpoint}${id}/`, { method: 'DELETE' });
                } else {
                    // Reactivate via PATCH
                    await api.request(`${endpoint}${id}/`, {
                        method: 'PATCH',
                        body: JSON.stringify({ is_active: true })
                    });
                }
                loadAll();
            } catch (err) {
                utils.showAlert(alertContainer, `Změna stavu selhala: ${err.message}`, 'danger');
            }
        }

        // ---- PROJECTS ----
        async function loadProjects() {
            const inc = showInactive.checked ? '?include_inactive=true' : '';
            const data = await api.request(`/projects/${inc}`);
            const items = data.results || data;
            const tbody = document.getElementById('projects-body');
            tbody.innerHTML = '';
            items.forEach(p => {
                const tr = document.createElement('tr');
                if (!p.is_active) tr.classList.add('inactive');
                tr.innerHTML = `
                    <td><input type="number" value="${p.sort_order}" data-id="${p.id}" data-field="sort_order" class="proj-edit" style="width:60px;"></td>
                    <td><code style="font-size:0.8rem;color:var(--gray-500);">${p.id}</code></td>
                    <td><input type="text" value="${utils.escapeHtml(p.name)}" data-id="${p.id}" data-field="name" class="proj-edit"></td>
                    <td><input type="text" value="${utils.escapeHtml(p.description || '')}" data-id="${p.id}" data-field="description" class="proj-edit"></td>
                    <td>${p.is_active ? '<span class="badge-active">Aktivní</span>' : '<span class="badge-inactive">Neaktivní</span>'}</td>
                    <td>
                        <button class="btn-icon ${p.is_active ? 'btn-deactivate' : 'btn-activate'}" data-id="${p.id}" data-active="${p.is_active}">
                            ${p.is_active ? 'Deaktivovat' : 'Aktivovat'}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            // Attach edit handlers
            tbody.querySelectorAll('.proj-edit').forEach(input => {
                input.addEventListener('change', () => {
                    const val = input.type === 'number' ? parseInt(input.value) : input.value;
                    saveField('/projects/', input.dataset.id, input.dataset.field, val);
                });
            });
            tbody.querySelectorAll('.btn-icon').forEach(btn => {
                btn.addEventListener('click', () => toggleActive('/projects/', btn.dataset.id, btn.dataset.active === 'true'));
            });
        }

        // ---- PRODUCTS ----
        async function loadProducts() {
            const inc = showInactive.checked ? '?include_inactive=true' : '';
            const data = await api.request(`/products/${inc}`);
            const items = data.results || data;
            allProducts = items;
            const tbody = document.getElementById('products-body');
            tbody.innerHTML = '';
            items.forEach(p => {
                const tr = document.createElement('tr');
                if (!p.is_active) tr.classList.add('inactive');
                tr.innerHTML = `
                    <td><input type="number" value="${p.sort_order}" data-id="${p.id}" data-field="sort_order" class="prod-edit" style="width:60px;"></td>
                    <td><code style="font-size:0.8rem;color:var(--gray-500);">${p.id}</code></td>
                    <td><input type="text" value="${utils.escapeHtml(p.name)}" data-id="${p.id}" data-field="name" class="prod-edit"></td>
                    <td>
                        <select data-id="${p.id}" data-field="category" class="prod-edit" style="width:auto;">
                            <option value="SKOLY" ${p.category === 'SKOLY' ? 'selected' : ''}>ŠKOLY</option>
                            <option value="FIRMY" ${p.category === 'FIRMY' ? 'selected' : ''}>FIRMY</option>
                        </select>
                    </td>
                    <td><input type="text" value="${utils.escapeHtml(p.description || '')}" data-id="${p.id}" data-field="description" class="prod-edit"></td>
                    <td>${p.is_active ? '<span class="badge-active">Aktivní</span>' : '<span class="badge-inactive">Neaktivní</span>'}</td>
                    <td>
                        <button class="btn-icon ${p.is_active ? 'btn-deactivate' : 'btn-activate'}" data-id="${p.id}" data-active="${p.is_active}">
                            ${p.is_active ? 'Deaktivovat' : 'Aktivovat'}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            tbody.querySelectorAll('.prod-edit').forEach(input => {
                input.addEventListener('change', () => {
                    const val = input.type === 'number' ? parseInt(input.value) : input.value;
                    saveField('/products/', input.dataset.id, input.dataset.field, val);
                });
            });
            tbody.querySelectorAll('.btn-icon').forEach(btn => {
                btn.addEventListener('click', () => toggleActive('/products/', btn.dataset.id, btn.dataset.active === 'true'));
            });
            // Update subgroup product dropdown
            const sel = document.getElementById('new-subgroup-product');
            sel.innerHTML = allProducts.filter(p => p.is_active).map(p =>
                `<option value="${p.id}">${utils.escapeHtml(p.name)}</option>`
            ).join('');
        }

        // ---- SUBGROUPS ----
        async function loadSubgroups() {
            const inc = showInactive.checked ? '?include_inactive=true' : '';
            const data = await api.request(`/subgroups/${inc}`);
            const items = data.results || data;
            const tbody = document.getElementById('subgroups-body');
            tbody.innerHTML = '';
            items.forEach(s => {
                const tr = document.createElement('tr');
                if (!s.is_active) tr.classList.add('inactive');
                tr.innerHTML = `
                    <td><input type="number" value="${s.sort_order}" data-id="${s.id}" data-field="sort_order" class="sub-edit" style="width:60px;"></td>
                    <td><code style="font-size:0.8rem;color:var(--gray-500);">${s.id}</code></td>
                    <td><input type="text" value="${utils.escapeHtml(s.name)}" data-id="${s.id}" data-field="name" class="sub-edit"></td>
                    <td><span class="subgroup-product">${utils.escapeHtml(s.product_name || s.product || '')}</span></td>
                    <td><input type="text" value="${utils.escapeHtml(s.description || '')}" data-id="${s.id}" data-field="description" class="sub-edit"></td>
                    <td>${s.is_active ? '<span class="badge-active">Aktivní</span>' : '<span class="badge-inactive">Neaktivní</span>'}</td>
                    <td>
                        <button class="btn-icon ${s.is_active ? 'btn-deactivate' : 'btn-activate'}" data-id="${s.id}" data-active="${s.is_active}">
                            ${s.is_active ? 'Deaktivovat' : 'Aktivovat'}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            tbody.querySelectorAll('.sub-edit').forEach(input => {
                input.addEventListener('change', () => {
                    const val = input.type === 'number' ? parseInt(input.value) : input.value;
                    saveField('/subgroups/', input.dataset.id, input.dataset.field, val);
                });
            });
            tbody.querySelectorAll('.btn-icon').forEach(btn => {
                btn.addEventListener('click', () => toggleActive('/subgroups/', btn.dataset.id, btn.dataset.active === 'true'));
            });
        }

        function loadAll() { loadProjects(); loadProducts(); loadSubgroups(); }
        showInactive.addEventListener('change', loadAll);
        loadAll();

        // ---- ADD NEW handlers ----
        // Projects
        document.getElementById('add-project-btn').addEventListener('click', () => {
            document.getElementById('add-project-form').style.display = 'flex';
        });
        document.getElementById('cancel-new-project').addEventListener('click', () => {
            document.getElementById('add-project-form').style.display = 'none';
        });
        document.getElementById('save-new-project').addEventListener('click', async () => {
            const id = document.getElementById('new-project-id').value.trim() || slugify(document.getElementById('new-project-name').value);
            const name = document.getElementById('new-project-name').value.trim();
            if (!id || !name) { utils.showAlert(alertContainer, 'Vyplňte ID a Název.', 'danger'); return; }
            try {
                await api.request('/projects/', {
                    method: 'POST',
                    body: JSON.stringify({ id, name, description: document.getElementById('new-project-desc').value.trim() })
                });
                document.getElementById('add-project-form').style.display = 'none';
                document.getElementById('new-project-id').value = '';
                document.getElementById('new-project-name').value = '';
                document.getElementById('new-project-desc').value = '';
                loadProjects();
                utils.showAlert(alertContainer, `Projekt "${name}" přidán.`, 'success');
            } catch (err) {
                utils.showAlert(alertContainer, `Přidání selhalo: ${err.message}`, 'danger');
            }
        });

        // Products
        document.getElementById('add-product-btn').addEventListener('click', () => {
            document.getElementById('add-product-form').style.display = 'flex';
        });
        document.getElementById('cancel-new-product').addEventListener('click', () => {
            document.getElementById('add-product-form').style.display = 'none';
        });
        document.getElementById('save-new-product').addEventListener('click', async () => {
            const id = document.getElementById('new-product-id').value.trim() || slugify(document.getElementById('new-product-name').value);
            const name = document.getElementById('new-product-name').value.trim();
            const category = document.getElementById('new-product-category').value;
            if (!id || !name) { utils.showAlert(alertContainer, 'Vyplňte ID a Název.', 'danger'); return; }
            try {
                await api.request('/products/', {
                    method: 'POST',
                    body: JSON.stringify({ id, name, category, description: document.getElementById('new-product-desc').value.trim() })
                });
                document.getElementById('add-product-form').style.display = 'none';
                document.getElementById('new-product-id').value = '';
                document.getElementById('new-product-name').value = '';
                document.getElementById('new-product-desc').value = '';
                loadProducts();
                utils.showAlert(alertContainer, `Produkt "${name}" přidán.`, 'success');
            } catch (err) {
                utils.showAlert(alertContainer, `Přidání selhalo: ${err.message}`, 'danger');
            }
        });

        // Subgroups
        document.getElementById('add-subgroup-btn').addEventListener('click', () => {
            document.getElementById('add-subgroup-form').style.display = 'flex';
        });
        document.getElementById('cancel-new-subgroup').addEventListener('click', () => {
            document.getElementById('add-subgroup-form').style.display = 'none';
        });
        document.getElementById('save-new-subgroup').addEventListener('click', async () => {
            const id = document.getElementById('new-subgroup-id').value.trim() || slugify(document.getElementById('new-subgroup-name').value);
            const name = document.getElementById('new-subgroup-name').value.trim();
            const product = document.getElementById('new-subgroup-product').value;
            if (!id || !name || !product) { utils.showAlert(alertContainer, 'Vyplňte ID, Název a Produkt.', 'danger'); return; }
            try {
                await api.request('/subgroups/', {
                    method: 'POST',
                    body: JSON.stringify({ id, name, product, description: document.getElementById('new-subgroup-desc').value.trim() })
                });
                document.getElementById('add-subgroup-form').style.display = 'none';
                document.getElementById('new-subgroup-id').value = '';
                document.getElementById('new-subgroup-name').value = '';
                document.getElementById('new-subgroup-desc').value = '';
                loadSubgroups();
                utils.showAlert(alertContainer, `Podskupina "${name}" přidána.`, 'success');
            } catch (err) {
                utils.showAlert(alertContainer, `Přidání selhalo: ${err.message}`, 'danger');
            }
        });
    });
    </script>
</body>
</html>
